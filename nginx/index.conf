# 工作副本：与 index.conf.template 相同结构，部署前请改路径与 fastcgi_pass。
# 详见 nginx/index.conf.template

server {
    listen 80;
    server_name localhost;

    set $my_tools_root /var/www/my_tools;

    root $my_tools_root/portal/public;
    index index.php;

    client_max_body_size 32m;

    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 120s;
    }

    location ~ \.php$ {
        deny all;
    }
}
